# fly.toml - Fly.io configuration for Booth Buddy

app = 'booth-buddy'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  NODE_ENV = 'production'

[deploy]
  release_command = 'npx prisma migrate deploy --schema=packages/shared/prisma/schema.prisma'
